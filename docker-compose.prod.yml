services:
  caddy:
    build:
      context: .
      dockerfile: packages/client/Dockerfile
    ports:
      - "8080:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - bff
    networks:
      - tone-net
    restart: unless-stopped

  bff:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      MESSAGING_SERVICE_URL: http://messaging:3001
      USERS_SERVICE_URL: http://users:3002
      ATTACHMENTS_SERVICE_URL: http://attachments:3003
    depends_on:
      - messaging
      - users
      - attachments
    networks:
      - tone-net
    restart: unless-stopped

  messaging:
    build:
      context: .
      dockerfile: packages/messagingService/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGO_URI: mongodb://mongo:27017/tone_messaging
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      USERS_SERVICE_URL: http://users:3002
    depends_on:
      - mongo
    networks:
      - tone-net
    restart: unless-stopped

  users:
    build:
      context: .
      dockerfile: packages/usersService/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://tone:${DB_PASSWORD}@users-db:5432/tone_users
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@localhost}
    depends_on:
      - users-db
    networks:
      - tone-net
    restart: unless-stopped

  attachments:
    build:
      context: .
      dockerfile: packages/attachmentsService/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgres://tone:${DB_PASSWORD}@attachments-db:5432/tone_attachments
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: tone-attachments
      S3_REGION: us-east-1
    depends_on:
      - attachments-db
      - minio-init
    networks:
      - tone-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    networks:
      - tone-net
    restart: unless-stopped

  users-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tone_users
      POSTGRES_USER: tone
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - users-db-data:/var/lib/postgresql/data
    networks:
      - tone-net
    restart: unless-stopped

  attachments-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tone_attachments
      POSTGRES_USER: tone
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - attachments-db-data:/var/lib/postgresql/data
    networks:
      - tone-net
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - tone-net
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - tone-net
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $$S3_ACCESS_KEY $$S3_SECRET_KEY &&
        mc mb --ignore-existing myminio/tone-attachments
      "
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}

networks:
  tone-net:

volumes:
  mongo-data:
  users-db-data:
  attachments-db-data:
  minio-data:
  caddy-data:
  caddy-config:
