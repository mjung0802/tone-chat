services:
  # Databases
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  users-db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tone
      POSTGRES_PASSWORD: tone_dev
      POSTGRES_DB: tone_users
    volumes:
      - users-pgdata:/var/lib/postgresql/data

  attachments-db:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tone
      POSTGRES_PASSWORD: tone_dev
      POSTGRES_DB: tone_attachments
    volumes:
      - attachments-pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025" # Web UI
      - "1025:1025" # SMTP

volumes:
  mongo-data:
  users-pgdata:
  attachments-pgdata:
  minio-data:
