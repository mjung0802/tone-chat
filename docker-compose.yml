services:
  # Databases
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  usersService:
    build: ./packages/usersService
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: postgres://tone:tone_dev@users-db:5432/tone_users
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: "false"
    depends_on:
      - users-db
      - minio
    volumes:
      - ./packages/usersService:/app

  users-db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tone
      POSTGRES_PASSWORD: tone_dev
      POSTGRES_DB: tone_users
    volumes:
      - users-pgdata:/var/lib/postgresql/data

  attachments-db:
    image: postgres:17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tone
      POSTGRES_PASSWORD: tone_dev
      POSTGRES_DB: tone_attachments
    volumes:
      - attachments-pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

volumes:
  mongo-data:
  users-pgdata:
  attachments-pgdata:
  minio-data:
