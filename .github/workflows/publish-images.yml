name: Publish Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version suffix to publish (use latest for unsuffixed tags)"
        required: false
        default: ""

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    name: Build and publish multi-arch images
    runs-on: ubuntu-latest
    env:
      PLATFORMS: linux/amd64,linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve publish metadata
        id: meta
        run: |
          set -euo pipefail

          if [[ -n "${{ github.event.inputs.version || '' }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="latest"
          fi

          REPO="${{ secrets.DOCKERHUB_USERNAME }}/tone-chat"

          if [[ "${VERSION}" == "latest" ]]; then
            {
              echo "BFF_TAG=${REPO}:bff"
              echo "USERS_TAG=${REPO}:users"
              echo "MESSAGING_TAG=${REPO}:messaging"
              echo "ATTACHMENTS_TAG=${REPO}:attachments"
              echo "CADDY_TAG=${REPO}:caddy"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "BFF_TAG=${REPO}:bff-${VERSION}"
              echo "USERS_TAG=${REPO}:users-${VERSION}"
              echo "MESSAGING_TAG=${REPO}:messaging-${VERSION}"
              echo "ATTACHMENTS_TAG=${REPO}:attachments-${VERSION}"
              echo "CADDY_TAG=${REPO}:caddy-${VERSION}"
            } >> "$GITHUB_OUTPUT"
          fi

          {
            echo "VERSION=${VERSION}"
            echo "REPO=${REPO}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push BFF
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/server/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.BFF_TAG }}

      - name: Build and push usersService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/usersService/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.USERS_TAG }}

      - name: Build and push messagingService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/messagingService/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.MESSAGING_TAG }}

      - name: Build and push attachmentsService
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/attachmentsService/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.ATTACHMENTS_TAG }}

      - name: Build and push caddy/client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/client/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.CADDY_TAG }}

      - name: Publish summary
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          Published version: ${{ steps.meta.outputs.VERSION }}

          Docker Hub repository: ${{ steps.meta.outputs.REPO }}

          Tags:
          - ${{ steps.meta.outputs.BFF_TAG }}
          - ${{ steps.meta.outputs.USERS_TAG }}
          - ${{ steps.meta.outputs.MESSAGING_TAG }}
          - ${{ steps.meta.outputs.ATTACHMENTS_TAG }}
          - ${{ steps.meta.outputs.CADDY_TAG }}
          EOF